[alembic]
script_location = src/ag2_example/alembic
prepend_sys_path = .
version_path_separator = os

[post_write_hooks]
hooks = ruff, format
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix --unsafe-fixes REVISION_SCRIPT_FILENAME
format.type = exec
format.executable = ruff
format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
